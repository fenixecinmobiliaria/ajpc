<header class="custom-toolbar" [class.shrink]="isShrunk">
  <!-- LOGO -->
  <div class="logo-container">
    <div class="imagen-logo" (click)="goToInicio()">
      <img src="assets/imagenes/logo.png" alt="Logo principal">
    </div>

    <!-- BOTÓN HAMBURGUESA -->
    <button class="hamburger" (click)="toggleMobileMenu()" aria-label="Abrir menú">
      <span [class.open]="mobileMenuOpen"></span>
      <span [class.open]="mobileMenuOpen"></span>
      <span [class.open]="mobileMenuOpen"></span>
    </button>
  </div>

  <!-- MENÚ PRINCIPAL -->
  <nav class="botones" [class.mobile-open]="mobileMenuOpen">
    <div class="botones-rec">
      <button class="nav-btn" (click)="goToInicio()">Inicio</button>
      <button class="nav-btn" (click)="goToCatalogo()">Catálogo</button>
      <button class="nav-btn" (click)="goToContacto()">Contacto</button>
      <button class="nav-btn" *ngIf="!isLoggedIn" (click)="goToAcercaDe()">Acerca de</button>
      <button class="nav-btn" *ngIf="isLoggedIn" (click)="goToMantenimiento()">Mantenimiento</button>
      <button class="nav-btn btn-accent" *ngIf="!isLoggedIn" (click)="openLoginModal()">Iniciar sesión</button>
      <button class="nav-btn btn-accent" *ngIf="isLoggedIn" (click)="cerrarSesion()">Cerrar sesión</button>
    </div>
  </nav>

  <!-- MODAL LOGIN -->
  <app-login-modal *ngIf="showLoginModal" (close)="closeLoginModal()"></app-login-modal>
</header>

<router-outlet></router-outlet>
