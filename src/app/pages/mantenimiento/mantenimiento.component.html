<div class="container mx-auto p-4">
  <h1 class="text-2xl font-bold mb-6 text-center">Gestión de Productos</h1>

  <!-- CONTENEDOR PRINCIPAL -->
  <div class="productos-layout flex flex-col lg:flex-row-reverse gap-6">

    <!-- SECCIÓN: NUEVO PRODUCTO (ahora a la derecha) -->
    <div class="seccion-formulario bg-white shadow-md rounded-lg p-6 flex-1 lg:w-1/3">
      <h2 class="text-xl font-semibold mb-4">{{ isEditing ? 'Editar Producto' : 'Nuevo Producto' }}</h2>
      <form #productForm="ngForm" (ngSubmit)="onSubmit()">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="form-group">
            <label for="nombre" class="block text-sm font-medium text-gray-700">Nombre</label>
            <input type="text" id="nombre" name="nombre" [(ngModel)]="productoSeleccionado.nombre" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2">
          </div>
          <div class="form-group">
            <label for="descripcion" class="block text-sm font-medium text-gray-700">Descripción</label>
            <input type="text" id="descripcion" name="descripcion" [(ngModel)]="productoSeleccionado.descripcion" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2">
          </div>
          <div class="form-group">
            <label for="categoria" class="block text-sm font-medium text-gray-700">Categoría</label>
            <input type="text" id="categoria" name="categoria" [(ngModel)]="productoSeleccionado.categoria" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2">
          </div>
          <div class="form-group">
            <label for="tipo" class="block text-sm font-medium text-gray-700">Tipo</label>
            <input type="text" id="tipo" name="tipo" [(ngModel)]="productoSeleccionado.tipo" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2">
          </div>
          <div class="form-group col-span-1 md:col-span-2">
            <label for="fotoFile" class="block text-sm font-medium text-gray-700">Imagen del Producto</label>
            <input type="file" id="fotoFile" (change)="onFileSelected($event)" accept="image/*" class="mt-1 block w-full text-sm text-gray-900 border border-gray-300 rounded-md cursor-pointer bg-gray-50 focus:outline-none focus:border-indigo-500 focus:ring-indigo-500 p-2">
            <div *ngIf="imageUrlPreview" class="mt-3">
              <p class="text-sm text-gray-600">Vista previa:</p>
                <img *ngIf="imageUrlPreview" [src]="imageUrlPreview" alt="Vista previa de la imagen" class="preview-image">
                <div *ngIf="isUploading" class="upload-progress-wrapper mt-2">
                  <div class="upload-progress-bar">
                    <div class="upload-progress-fill" [style.width.%]="uploadProgress || 0"></div>
                  </div>
                  <p class="text-sm text-gray-600 mt-1">Subiendo: {{ uploadProgress || 0 }}%</p>
                </div>

                <!-- preview controls: selection only (manual deletion removed; previous image deleted automatically on replace) -->
            </div>
          </div>
        </div>

        <div class="mt-6 flex justify-end gap-2">
          <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
            {{ isEditing ? 'Actualizar' : 'Guardar' }}
          </button>
          <button type="button" (click)="cancelEdit()" *ngIf="isEditing" class="bg-gray-400 text-white px-4 py-2 rounded-md hover:bg-gray-500 focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-2">
            Cancelar
          </button>
        </div>
      </form>
    </div>

    <!-- SECCIÓN: LISTA DE PRODUCTOS (ahora a la izquierda) -->
    <div class="seccion-lista bg-white shadow-md rounded-lg p-6 flex-1 lg:w-2/3">
      <h2 class="text-xl font-semibold mb-4">Lista de Productos</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div *ngFor="let producto of productos" class="card-product bg-gray-50 shadow-lg rounded-xl p-4 border-2 border-gray-300 flex flex-col justify-between transition-transform hover:-translate-y-1 hover:shadow-xl">
          <div>
            <h3 class="text-lg font-semibold text-gray-900 mb-2">{{ producto.nombre }}</h3>
            <p class="text-sm text-gray-600 mb-1"><strong>Tipo:</strong> {{ producto.tipo }}</p>
            <p class="text-sm text-gray-600 mb-1"><strong>Categoría:</strong> {{ producto.categoria }}</p>
            <p class="text-sm text-gray-600 mb-3">{{ producto.descripcion }}</p>
          </div>
          <div class="mt-4 flex justify-end gap-2 actions">
            <button (click)="editProduct(producto)" class="text-indigo-600 hover:text-indigo-900 text-sm px-2 py-1 border border-indigo-600 rounded hover:bg-indigo-50">Editar</button>
            <button (click)="deleteProduct(producto.id!)" class="text-red-600 hover:text-red-900 text-sm px-2 py-1 border border-red-600 rounded hover:bg-red-50">Eliminar</button>
            <!-- image deletion via UI removed; images are removed automatically when replaced -->
          </div>
        </div>

        <div *ngIf="productos.length === 0" class="col-span-full text-center text-sm text-gray-500 py-4">
          No hay productos registrados.
        </div>
      </div>
    </div>

  </div>
</div>
