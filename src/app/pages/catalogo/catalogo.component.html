<div class="catalog-container">
  <!-- === Barra lateral de búsqueda === -->
  <aside class="search-sidebar">
    <h2>Buscar Productos</h2>

    <div class="search-filters">
      <input
        type="text"
        id="searchTerm"
        placeholder=" Buscar producto..."
        [(ngModel)]="searchTerm"
      />

      <div class="category-buttons">
        <button class="filter-button active" (click)="filtrarPorCategoria('')">Todos</button>
        <button class="filter-button" (click)="filtrarPorCategoria('Ambulancia')">Ambulancias</button>
        <button class="filter-button" (click)="filtrarPorCategoria('Equipo Medico')">Equipo Médico</button>
        <button class="filter-button" (click)="filtrarPorCategoria('Utileria Medica')">Utilería Médica</button>
      </div>
    </div>

    <button class="search-button" (click)="search()">Buscar</button>
  </aside>

  <!-- === Sección principal del catálogo === -->
  <main class="catalog-content">
    <div class="catalog-header">
      <h2>Catálogo de Productos</h2>
      <p *ngIf="filteredProducts.length > 0">{{ filteredProducts.length }} resultados encontrados</p>
      <p *ngIf="filteredProducts.length === 0" class="no-results">No se encontraron productos.</p>
    </div>

    <div class="catalog-items">
      <div *ngFor="let product of filteredProducts" class="catalog-item" (click)="selectProduct(product)">
        <div class="media-container">
          <img [src]="product.foto" [alt]="product.nombre" />
        </div>
        <div class="info">
          <h3>{{ product.nombre }}</h3>
          <p>{{ product.descripcion }}</p>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div *ngIf="selectedProduct" class="modal-overlay" (click)="closeModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <span class="close-button" (click)="closeModal()">&times;</span>
    <div class="modal-body">
      <div class="modal-image">
        <img [src]="selectedProduct.foto" alt="{{ selectedProduct.nombre }}">
      </div>
      <div class="modal-details">
        <h2>{{ selectedProduct.nombre }}</h2>
        <p><strong>Categoría:</strong> {{ selectedProduct.categoria }}</p>
        <p><strong>Descripción:</strong> {{ selectedProduct.descripcion }}</p>
        <!-- Agrega más detalles del producto si es necesario -->
      </div>
    </div>
  </div>
</div>
